# Cloudflare Worker with Static Assets Configuration
name = "kmc"
main = "src/worker.ts"
compatibility_date = "2024-04-01"

# Enable modern Node.js compatibility APIs
compatibility_flags = [ "nodejs_compat" ]

# Static Assets Configuration for Workers
[assets]
directory = "./dist"
binding = "ASSETS"

# Bind Cloudflare KV Namespace to persist diesel logs, sites, and deliveries
# Once you have created a KV namespace in your Cloudflare dashboard (under Workers & Pages > KV),
# uncomment the lines below and paste your real ID:
# [[kv_namespaces]]
# binding = "DATA_KV"
# id = "YOUR_CLOUDFLARE_KV_NAMESPACE_ID"

# Environment Variables
[vars]
VITE_ENV = "production"
