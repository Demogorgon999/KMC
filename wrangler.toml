# Cloudflare Worker with Static Assets Configuration
name = "kmc"
main = "src/worker.ts"
compatibility_date = "2024-04-01"

# Enable modern Node.js compatibility APIs
compatibility_flags = [ "nodejs_compat" ]

# Static Assets Configuration for Workers
[assets]
directory = "./dist"
binding = "ASSETS"

# D1 database binding - this makes the "DB" binding permanent across every deploy.
# Without this block, `wrangler deploy` wipes out any binding added manually via
# the dashboard, which is why the app kept losing its database connection.
[[d1_databases]]
binding = "DB"
database_name = "kmc-ledger"
database_id = "b5596a91-7370-481b-8316-e5b0352a1dd8"

# Environment Variables
[vars]
VITE_ENV = "production"
